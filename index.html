<!DOCTYPE html>
<html lang="vi">
<head>
    <meta property="og:image" content="Screenshot 2026-03-21 120415.png">
    <meta property="og:title" content="Món quà nhỏ anh dành cho em!">
    <meta property="og:description" content="Nhấn vào để xem bí mật anh giấu trong này nhé...">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi người anh thương</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Arial', sans-serif;
        }
        #text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        h1 {
            color: #ff3366;
            font-size: 3.5rem;
            text-shadow: 0 0 20px rgba(255, 51, 102, 0.8);
            margin: 0;
            opacity: 0;
            animation: fadeIn 3s forwards ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div id="text-container">
        <h1>EM CHÍNH LÀ BÔNG HOA XINH ĐẸP NHẤT  ❤️</h1>
    </div>

    <canvas id="fireworksCanvas"></canvas>

    <script>
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        class Particle {
            constructor(x, y, color, velocityX, velocityY) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocityX = velocityX;
                this.velocityY = velocityY;
                this.alpha = 1;
                this.friction = 0.95;
                this.gravity = 0.2;
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                this.velocityX *= this.friction;
                this.velocityY *= this.friction;
                this.velocityY += this.gravity;
                this.x += this.velocityX;
                this.y += this.velocityY;
                this.alpha -= 0.01;
            }
        }

        let particles = [];

        function createFirework(x, y) {
            const particleCount = 40;
            const color = `hsl(${Math.random() * 360}, 100%, 60%)`;
            for (let i = 0; i < particleCount; i++) {
                const angle = (Math.PI * 2 / particleCount) * i;
                const velocity = Math.random() * 8 + 2;
                particles.push(new Particle(
                    x, y, color,
                    Math.cos(angle) * velocity,
                    Math.sin(angle) * velocity
                ));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((particle, index) => {
                if (particle.alpha > 0) {
                    particle.update();
                    particle.draw();
                } else {
                    particles.splice(index, 1);
                }
            });

            requestAnimationFrame(animate);
        }

        // Tự động bắn pháo hoa cho đến khi thoát  
        let autoFire = setInterval(() => {
            createFirework(Math.random() * canvas.width, Math.random() * canvas.height * 0.5);
        }, 800);

        // người dùng tự chơi
        setTimeout(() => clearInterval(autoFire), 10000);

        // Hiệu ứng khi chạm/click
        canvas.addEventListener('mousedown', (e) => {
            createFirework(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            createFirework(e.touches[0].clientX, e.touches[0].clientY);
        });

        animate();
    </script>
</body>
</html>
